<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivshakti Mess</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Plus Jakarta Sans',sans-serif;background:#12100D;color:#fff;}
nav{display:flex;justify-content:space-between;padding:15px 30px;background:#0d0a06;position:sticky;top:0;}
nav h2{color:#E8650A;}
nav button{background:#E8650A;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;}

.hero{text-align:center;padding:100px 20px;}
.hero h1{font-size:50px;color:#E8650A;}
.hero p{color:#ccc;}

.section{padding:60px 20px;text-align:center;}
.cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.card{background:#1c1710;padding:20px;border-radius:12px;width:200px;border:1px solid #333;}

.booking{max-width:400px;margin:auto;background:#1c1710;padding:20px;border-radius:12px;}
.booking input, .booking select{
width:100%;padding:10px;margin:8px 0;border-radius:6px;border:none;
}
.booking button{width:100%;padding:12px;background:#E8650A;border:none;color:#fff;border-radius:6px;cursor:pointer;}

footer{text-align:center;padding:20px;background:#0d0a06;margin-top:40px;color:#aaa;}
</style>
</head>

<body>

<nav>
<h2>Shivshakti Mess</h2>
<button onclick="scrollToBooking()">Book Now</button>
</nav>

<section class="hero">
<h1>Delicious Home Food 🍱</h1>
<p>Healthy, Hygienic & Affordable Meals</p>
</section>

<section class="section">
<h2>Our Services</h2>
<div class="cards">
<div class="card">🍛 Lunch</div>
<div class="card">🥘 Dinner</div>
<div class="card">🥗 Healthy Meals</div>
</div>
</section>

<section class="section" id="booking">
<h2>Book Your Meal</h2>
<div class="booking">
<input type="text" id="name" placeholder="Your Name">
<input type="tel" id="phone" placeholder="Phone Number">
<select id="meal">
<option>Lunch</option>
<option>Dinner</option>
</select>
<button onclick="bookNow()">Confirm Booking</button>
</div>
</section>

<footer>
<p>© 2026 Shivshakti Mess | Contact: 9876543210</p>
</footer>

<script>
function scrollToBooking(){
 document.getElementById('booking').scrollIntoView({behavior:'smooth'});
}

function bookNow(){
 let name=document.getElementById('name').value;
 let phone=document.getElementById('phone').value;

 if(name==="" || phone===""){
   alert("Please fill all details");
   return;
 }

 if(phone.length<10){
   alert("Invalid phone number");
   return;
 }

 alert("Booking Successful ✅\nName: "+name);
}
</script>

</body>
</html>
